# The single index gate for the shared AI-governance layer. Every dashboard
# panel and saved search goes through this macro; admins who use a different
# index override it in local/macros.conf. (The AI_Governance data model
# constraint cannot expand macros and names the index directly — keep the two
# in sync if you change it.)

[ai_governance_index]
definition = (index=cloud_llm_apis)
iseval = 0
