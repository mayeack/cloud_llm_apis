# AI Governance detections and reports — provider-neutral, over the ai.* contract.
# All alerts ship disabled (Splunkbase convention) but fully configured — set
# disabled=0 in local/savedsearches.conf to activate, then attach the alert
# actions (email, notable, ...) your environment uses.

[AI Governance - Multiple sign-in IPs for same user]
description = Fires when a user signs in from 3 or more distinct IP addresses within 24 hours (any provider).
search = `ai_governance_index` ai.record="activity" ai.event_category="authentication" ai.action="login" ai.actor.email=* \
| rename ai.actor.email AS user, ai.actor.ip AS src_ip \
| stats dc(src_ip) AS ip_count values(src_ip) AS ips by user \
| where ip_count >= 3
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

