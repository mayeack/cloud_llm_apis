[AI Governance - Top cost users daily]
description = Daily report: top 20 users by total AI spend over the trailing 7 days, across providers.
search = `ai_governance_index` ai.record="user_cost" \
| rename ai.actor.email AS user, ai.cost.amount_usd AS cost_usd \
| stats sum(cost_usd) AS total_cost_usd by user \
| sort - total_cost_usd \
| head 20
cron_schedule = 0 8 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
allow_skew = 10%

