[AI Governance - Chat access failure spike]
description = A user hit 5 or more denied chat-content access attempts within an hour, on any provider.
search = `ai_governance_index` ai.record="activity" ai.event_category="content_access" ai.resource.type="chat" ai.outcome="failure" \
| rename ai.actor.email AS user, ai.resource.id AS chat_id \
| stats count values(chat_id) AS chats by user \
| where count >= 5
cron_schedule = 20 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 2h
allow_skew = 10%

[AI Governance - New audit API consumer]
description = A previously unseen user-agent/IP combination read a provider audit/compliance API in the last day (baseline: 30 days). The audit feed itself is sensitive data.
search = `ai_governance_index` ai.record="activity" ai.event_category="data_export" ai.action="read" \
| rename ai.actor.user_agent AS user_agent, ai.actor.ip AS src_ip \
| stats earliest(_time) AS first_seen count by user_agent, src_ip \
| where first_seen >= relative_time(now(), "-1d") \
| convert ctime(first_seen)
cron_schedule = 30 6 * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

[AI Governance - Spend limit reached]
description = A user's effective spend limit is at or above 100% utilization (zero-limit seats count as fully utilized).
search = `ai_governance_index` ai.record="spend_limit" \
| rename ai.actor.email AS user, ai.cost.utilization_pct AS utilization_pct, ai.cost.spend_usd AS period_spend_usd, ai.cost.limit_usd AS spend_limit_usd \
| stats latest(utilization_pct) AS utilization_pct latest(period_spend_usd) AS period_spend_usd latest(spend_limit_usd) AS spend_limit_usd by user \
| where utilization_pct >= 100
cron_schedule = 45 */4 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

[AI Governance - Daily spend spike]
description = Yesterday's total AI spend exceeded 150% of the trailing 7-day daily average, across providers.
search = `ai_governance_index` ai.record="cost" \
| rename ai.cost.amount_usd AS cost_usd \
| bin _time span=1d \
| stats sum(cost_usd) AS daily by _time \
| sort - _time \
| streamstats count AS n \
| eval yesterday_usd=if(n=1, daily, null()), baseline=if(n>1 AND n<=8, daily, null()) \
| stats max(yesterday_usd) AS yesterday_usd avg(baseline) AS baseline_avg_usd \
| where yesterday_usd > 1.5*baseline_avg_usd
cron_schedule = 0 9 * * *
dispatch.earliest_time = -9d@d
dispatch.latest_time = @d
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 20h
allow_skew = 10%
