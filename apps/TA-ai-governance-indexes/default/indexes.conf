# The shared AI-governance event index. All provider TAs point their inputs
# here; the SA's ai_governance_index macro and the AI_Governance data model
# constraint reference it. Size/retention are deployment decisions — override
# in local/indexes.conf.

[cloud_llm_apis]
homePath = $SPLUNK_DB/cloud_llm_apis/db
coldPath = $SPLUNK_DB/cloud_llm_apis/colddb
thawedPath = $SPLUNK_DB/cloud_llm_apis/thaweddb
maxTotalDataSizeMB = 512000
