[Anthropic Claude - New compliance API consumer]
description = A previously unseen user-agent/IP combination read the Compliance API in the last day (baseline: 30 days). The audit feed itself is sensitive data.
search = `anthropic_claude_index` sourcetype="anthropic:compliance:activity" event_type=compliance_api_accessed \
| stats earliest(_time) AS first_seen count by actor_user_agent, actor_ip_address \
| where first_seen >= relative_time(now(), "-1d") \
| convert ctime(first_seen)
cron_schedule = 30 6 * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

[Anthropic Claude - Spend limit reached]
description = A user's effective spend limit is at or above 100% utilization (zero-limit seats count as fully utilized).
search = `anthropic_claude_index` sourcetype="anthropic:analytics:spend_limit" \
| eval spend_limit_usd=coalesce(spend_limit_usd, if(isnull(amount) OR amount="", null(), tonumber(amount)/100)) \
| eval period_spend_usd=coalesce(period_spend_usd, tonumber(period_to_date_spend)/100) \
| eval utilization_pct=coalesce(utilization_pct, if(spend_limit_usd>0, round(100*period_spend_usd/spend_limit_usd,1), null())) \
| stats latest(utilization_pct) AS utilization_pct latest(period_spend_usd) AS period_spend_usd latest(spend_limit_usd) AS spend_limit_usd by email \
| where utilization_pct >= 100
cron_schedule = 45 */4 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

[Anthropic Claude - Daily spend spike]
description = Yesterday's total spend exceeded 150% of the trailing 7-day daily average.
search = `anthropic_claude_index` sourcetype="anthropic:analytics:cost" \
| eval cost_usd=coalesce(total_cost_usd, tonumber(amount)/100) \
| bin _time span=1d \
| stats sum(cost_usd) AS daily by _time \
| sort - _time \
| streamstats count AS n \
| eval yesterday_usd=if(n=1, daily, null()), baseline=if(n>1 AND n<=8, daily, null()) \
| stats max(yesterday_usd) AS yesterday_usd avg(baseline) AS baseline_avg_usd \
| where yesterday_usd > 1.5*baseline_avg_usd
cron_schedule = 0 9 * * *
dispatch.earliest_time = -9d@d
dispatch.latest_time = @d
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 20h
allow_skew = 10%

[Anthropic Claude - TA ingestion stopped]
description = No compliance activity events have been indexed for over 2 hours - the add-on input, credentials, or network may be broken.
search = | tstats latest(_time) AS last WHERE `anthropic_claude_index` sourcetype="anthropic:compliance:activity" \
| eval lag_sec=now()-coalesce(last,0) \
| where lag_sec > 7200
cron_schedule = 25 * * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 4h
allow_skew = 10%
