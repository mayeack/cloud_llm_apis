[Anthropic Claude - Top cost users daily]
description = Daily report: top 20 users by total Claude spend over the trailing 7 days.
search = `anthropic_claude_index` sourcetype="anthropic:analytics:user_cost" \
| eval cost_usd=coalesce(total_cost_usd, tonumber(amount)/100) \
| stats sum(cost_usd) AS total_cost_usd by email \
| sort - total_cost_usd \
| head 20
cron_schedule = 0 8 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
allow_skew = 10%

