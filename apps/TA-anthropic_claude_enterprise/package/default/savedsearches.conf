# Anthropic Claude Enterprise Add-on saved searches.
# All alerts ship disabled (Splunkbase convention) but fully configured —
# set disabled=0 in local/savedsearches.conf to activate, then attach the
# alert actions (email, notable, ...) your environment uses.

[Anthropic Claude - Multiple sign-in IPs for same user]
description = Fires when a user signs in from 3 or more distinct IP addresses within 24 hours.
search = `anthropic_claude_index` sourcetype="anthropic:compliance:activity" event_type=user_signed_in_* actor_email=* actor_email!="null" \
| stats dc(actor_ip_address) AS ip_count values(actor_ip_address) AS ips by actor_email \
| where ip_count >= 3
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
disabled = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 12h
allow_skew = 10%

