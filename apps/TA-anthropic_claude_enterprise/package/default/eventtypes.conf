[anthropic_claude_auth_events]
search = (sourcetype="anthropic:compliance:activity" (event_type="user_signed_in_*" OR event_type="user_signed_out" OR event_type="sso_login_initiated"))

[anthropic_claude_change_events]
search = (sourcetype="anthropic:compliance:activity" (event_type="org_*" OR event_type="project_*" OR event_type="conversation_renamed" OR event_type="conversation_deleted" OR event_type="rbac_*" OR event_type="group_*" OR event_type="*api_key_*" OR event_type="*_role_updated" OR event_type="user_name_changed" OR event_type="platform_memory_*" OR event_type="claude_code_*_updated" OR event_type="mcp_*" OR event_type="integration_*" OR event_type="extension_*" OR event_type="billing_*") NOT (event_type="*_viewed" OR event_type="*_accessed" OR event_type="*_listed"))

[anthropic_claude_file_events]
search = (sourcetype="anthropic:compliance:activity" (event_type="claude_file_*" OR event_type="file_*"))

[anthropic_claude_usage_events]
search = (sourcetype="anthropic:analytics:*")

[anthropic_claude_api_access_events]
search = (sourcetype="anthropic:compliance:activity" event_type="compliance_api_accessed")
