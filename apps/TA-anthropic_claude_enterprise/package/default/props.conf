[anthropic:compliance:activity]
SHOULD_LINEMERGE = false
TRUNCATE = 999999
TIME_PREFIX = "created_at"
# Seconds-precision prefix parses created_at with or without fractional seconds;
# TZ pins the zone since the trailing Z is not consumed by the format.
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TZ = UTC
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 64
category = Security

# --- null-string guards -------------------------------------------------------
# The API returns JSON nulls which index as the literal string "null"; these
# calculated fields turn them back into real nulls so stats/tables stay clean.
EVAL-actor_email = if(actor_email=="null" OR actor_email=="", null(), actor_email)
EVAL-actor_user_id = if(actor_user_id=="null" OR actor_user_id=="", null(), actor_user_id)
EVAL-actor_ip_address = if(actor_ip_address=="null" OR actor_ip_address=="", null(), actor_ip_address)
EVAL-actor_user_agent = if(actor_user_agent=="null" OR actor_user_agent=="", null(), actor_user_agent)
EVAL-organization_id = if(organization_id=="null" OR organization_id=="", null(), organization_id)
EVAL-organization_uuid = if(organization_uuid=="null" OR organization_uuid=="", null(), organization_uuid)
EVAL-claude_chat_id = if(claude_chat_id=="null" OR claude_chat_id=="", null(), claude_chat_id)
EVAL-claude_project_id = if(claude_project_id=="null" OR claude_project_id=="", null(), claude_project_id)
EVAL-file_id = if(file_id=="null" OR file_id=="", null(), file_id)

# --- CIM Authentication + Change ----------------------------------------------
EVAL-user = if(actor_email=="null" OR actor_email=="", null(), actor_email)
EVAL-src = if(actor_ip_address=="null" OR actor_ip_address=="", null(), actor_ip_address)
EVAL-app = "claude_enterprise"
EVAL-vendor_product = "Anthropic Claude Enterprise"
EVAL-action = case(like(event_type,"user_signed_in%"), "success", event_type=="user_signed_out", "logoff", event_type=="sso_login_initiated", "unknown", like(event_type,"%_created") OR like(event_type,"%_generated") OR like(event_type,"%_sent") OR like(event_type,"%_installed"), "created", like(event_type,"%_deleted") OR like(event_type,"%_revoked"), "deleted", like(event_type,"%_updated") OR like(event_type,"%_changed") OR like(event_type,"%_renamed") OR like(event_type,"%_toggled") OR like(event_type,"%_verified") OR like(event_type,"%_activated") OR like(event_type,"%_deactivated") OR like(event_type,"%_assigned") OR like(event_type,"%_accepted") OR like(event_type,"%_disabled") OR like(event_type,"%_enabled"), "modified", like(event_type,"%_viewed") OR like(event_type,"%_accessed"), "read", 1==1, null())
EVAL-authentication_method = case(like(event_type,"%_sso") OR event_type=="sso_login_initiated", "sso", like(event_type,"%_google"), "google", like(event_type,"%_apple"), "apple", like(event_type,"%_magic_link"), "magic_link", like(event_type,"%_phone_code"), "phone_code", 1==1, null())
EVAL-object = case(claude_project_id!="null" AND claude_project_id!="", claude_project_id, claude_chat_id!="null" AND claude_chat_id!="", claude_chat_id, file_id!="null" AND file_id!="", file_id, organization_id!="null" AND organization_id!="", organization_id, 1==1, null())
EVAL-object_category = case(like(event_type,"project%"), "project", like(event_type,"%api_key%"), "api_key", like(event_type,"org_sso%") OR like(event_type,"org_jit%") OR like(event_type,"org_domain%") OR event_type=="sso_login_initiated", "identity", like(event_type,"org_user%") OR like(event_type,"%_role_%") OR like(event_type,"rbac%") OR like(event_type,"group%") OR event_type=="user_name_changed", "user", like(event_type,"claude_chat%") OR like(event_type,"conversation%"), "chat", like(event_type,"%file%"), "file", like(event_type,"platform_memory%"), "memory", like(event_type,"mcp%") OR like(event_type,"integration%") OR like(event_type,"extension%"), "integration", 1==1, "other")
EVAL-command = event_type
EVAL-change_type = case(like(event_type,"%_role_%") OR like(event_type,"rbac%") OR like(event_type,"org_user%") OR like(event_type,"org_sso%") OR like(event_type,"org_jit%") OR like(event_type,"group%") OR like(event_type,"%api_key%"), "AAA", 1==1, "configuration")
EVAL-status = "success"

