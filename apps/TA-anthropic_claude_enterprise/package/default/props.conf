# Index/search-time props for the 14 Anthropic sourcetypes.
#
# Events are the nested ai/raw shape (docs/ai-schema.md): the adapter emits
# "ai" first with "time" first inside it, so one TIME_PREFIX serves every
# sourcetype — live modular-input events carry an explicit time and skip this;
# it exists for file-monitored fixtures and any replayed data.
#
# Deliberately ABSENT (owned by the adapter since v2.0.0): null-string EVAL
# guards (adapter omits null keys recursively) and stock-CIM EVALs (program
# uses the custom AI_Governance data model in SA-ai-governance instead).

[anthropic:compliance:activity]
SHOULD_LINEMERGE = false
TRUNCATE = 999999
TIME_PREFIX = "time":\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TZ = UTC
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE = json
category = Security

