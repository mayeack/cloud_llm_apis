####################################################################
# TA-cloud_llm_apis - parsing and ai.* normalization
#
# Normalized sourcetypes (usage/cost/engagement) are written by the modular
# inputs (and the companion data generator) already flattened with ai.* keys,
# so KV_MODE=json extraction surfaces them at search time. Compliance activity
# is indexed raw and normalized here via FIELDALIAS/EVAL.
#
# Design choice: KV_MODE=json (search-time) is used instead of
# INDEXED_EXTRACTIONS=json to avoid index-time dotted-field bloat and keep the
# package portable to Splunk Cloud. Dotted ai.* fields must be single-quoted
# in SPL, e.g. sum('ai.tokens.total').
####################################################################

[anthropic:compliance:activity]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.api_family = "compliance"
EVAL-ai.event.category = "governance"
FIELDALIAS-ai_event_id = id AS ai.event.id
FIELDALIAS-ai_event_created_at = created_at AS ai.event.created_at
FIELDALIAS-ai_org_id = organization_id AS ai.org.id
FIELDALIAS-ai_org_uuid = organization_uuid AS ai.org.uuid
FIELDALIAS-ai_event_type = type AS ai.event.type
FIELDALIAS-ai_actor_type = actor.type AS ai.actor.type
FIELDALIAS-ai_actor_id = actor.user_id AS ai.actor.id
FIELDALIAS-ai_actor_email = actor.email_address AS ai.actor.email
FIELDALIAS-ai_actor_ip = actor.ip_address AS ai.actor.ip
FIELDALIAS-ai_actor_user_agent = actor.user_agent AS ai.actor.user_agent
FIELDALIAS-ai_api_key_id = actor.api_key_id AS ai.api_key.id
FIELDALIAS-ai_chat_id = claude_chat_id AS ai.governance.chat_id
FIELDALIAS-ai_project_id = claude_project_id AS ai.governance.project_id
FIELDALIAS-ai_file_id = claude_file_id AS ai.governance.file_id
EVAL-ai.event.action = replace('ai.event.type', "^claude_", "")
EVAL-ai.governance.object_type = case(isnotnull('ai.governance.chat_id'),"chat",isnotnull('ai.governance.file_id'),"file",isnotnull('ai.governance.project_id'),"project",like('ai.event.type',"%user%"),"user",like('ai.event.type',"%api_key%"),"api_key",true(),"unknown")

[anthropic:analytics:usage]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ai\.bucket\.start"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.event.category = "usage"
EVAL-ai.tokens.cache_creation.total = coalesce('ai.tokens.cache_creation.5m',0)+coalesce('ai.tokens.cache_creation.1h',0)
EVAL-ai.tokens.total = coalesce('ai.tokens.input.uncached',0)+coalesce('ai.tokens.cache_creation.total',0)+coalesce('ai.tokens.cache_read',0)+coalesce('ai.tokens.output',0)

[anthropic:analytics:cost]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ai\.bucket\.start"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.event.category = "cost"
EVAL-ai.cost.amount_usd = if('ai.cost.currency'="USD", tonumber('ai.cost.amount_cents')/100, null())
EVAL-ai.cost.list_amount_usd = if('ai.cost.currency'="USD", tonumber('ai.cost.list_amount_cents')/100, null())

[anthropic:analytics:user_usage]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ai\.analytics\.data_refreshed_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.event.category = "usage"
EVAL-ai.tokens.cache_creation.total = coalesce('ai.tokens.cache_creation.5m',0)+coalesce('ai.tokens.cache_creation.1h',0)
EVAL-ai.tokens.total = coalesce('ai.tokens.total', coalesce('ai.tokens.input.uncached',0)+coalesce('ai.tokens.cache_creation.total',0)+coalesce('ai.tokens.cache_read',0)+coalesce('ai.tokens.output',0))

[anthropic:analytics:user_cost]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ai\.analytics\.data_refreshed_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.event.category = "cost"
EVAL-ai.cost.amount_usd = if('ai.cost.currency'="USD", tonumber('ai.cost.amount_cents')/100, null())
EVAL-ai.cost.list_amount_usd = if('ai.cost.currency'="USD", tonumber('ai.cost.list_amount_cents')/100, null())

[anthropic:analytics:engagement]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ai\.event\.created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%d
MAX_TIMESTAMP_LOOKAHEAD = 30
EVAL-ai.provider = "anthropic"
EVAL-ai.event.category = "engagement"

[cloud_llm_apis:health]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "ts"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
