####################################################################
# TA-cloud_llm_apis modular input templates.
#
# These stanzas are shipped DISABLED with no credentials. Create configured,
# enabled copies in local/inputs.conf (or via Settings > Data inputs). The
# api_key you enter is moved into Splunk's encrypted storage/passwords on first
# run and the on-disk value is masked. See README/inputs.conf.spec.
####################################################################

[anthropic_compliance_activity://example]
disabled = 1
base_url = https://api.anthropic.com
endpoint = /v1/compliance/activities
index = cloud_llm_apis
interval = 60
limit = 5000
initial_lookback_minutes = 60
include_raw_content = false
redact_actor_email = false
redact_ip_address = false
timeout = 30
verify_ssl = true

[anthropic_admin_usage://example]
disabled = 1
base_url = https://api.anthropic.com
anthropic_version = 2023-06-01
index = cloud_llm_apis
interval = 300
bucket_width = 1m
initial_lookback_minutes = 60
group_by_usage = model,workspace_id,api_key_id,service_tier,context_window,inference_geo
group_by_cost = workspace_id,description
collect_usage = true
collect_cost = true
timeout = 30
verify_ssl = true

[anthropic_enterprise_analytics://example]
disabled = 1
base_url = https://api.anthropic.com/v1/organizations/analytics
index = cloud_llm_apis
interval = 3600
bucket_width = 1h
initial_lookback_hours = 24
collect_usage_report = true
collect_cost_report = true
collect_user_usage_report = true
collect_user_cost_report = true
collect_engagement_users = false
collect_engagement_summaries = true
collect_engagement_projects = true
collect_engagement_skills = true
collect_engagement_connectors = true
usage_group_by = product,model,context_window,inference_geo,speed
cost_group_by = product,model,cost_type,token_type,context_window,inference_geo,speed
products = chat,claude_code,cowork,office_agent,claude_in_chrome,claude_design
exclude_deleted_users = false
engagement_delay_days = 3
engagement_initial_lookback_days = 7
timeout = 30
verify_ssl = true
