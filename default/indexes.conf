# Index for Cloud LLM APIs governance data.
# Optional convenience for Splunk Enterprise single-instance deployments.
# On Splunk Cloud or clustered indexers, create the index via the platform
# instead and point the inputs at it.

[cloud_llm_apis]
homePath = $SPLUNK_DB/cloud_llm_apis/db
coldPath = $SPLUNK_DB/cloud_llm_apis/colddb
thawedPath = $SPLUNK_DB/cloud_llm_apis/thaweddb
# 6 years to match the Anthropic Compliance Activity Feed retention window.
frozenTimePeriodInSecs = 189216000
