[Anthropic Claude - Multiple sign-in IPs for same user]
action.email = 0
action.notable = 0
alert.track = 0
cron_schedule = 0 */6 * * *
description = Same user sign-in from multiple IPs in 24h.
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 1
is_scheduled = 0
search = sourcetype="anthropic:compliance:activity" event_type=user_signed_in_* \
| stats dc(actor_ip_address) AS ip_count values(actor_ip_address) AS ips by actor_email \
| where ip_count > 2

[Anthropic Claude - SSO configuration change]
action.email = 0
action.notable = 0
alert.track = 0
cron_schedule = 0 */1 * * *
description = SSO or JIT configuration change.
dispatch.earliest_time = -1h
dispatch.latest_time = now
disabled = 1
is_scheduled = 0
search = sourcetype="anthropic:compliance:activity" (event_type="org_sso_*" OR event_type="org_jit_toggled")

[Anthropic Claude - Data export started]
action.email = 0
action.notable = 0
alert.track = 0
cron_schedule = 0 * * * *
description = Organization data export started.
dispatch.earliest_time = -1h
dispatch.latest_time = now
disabled = 1
is_scheduled = 0
search = sourcetype="anthropic:compliance:activity" event_type="org_data_export_started"

[Anthropic Claude - Top cost users daily]
action.email = 0
alert.track = 0
cron_schedule = 0 8 * * *
description = Top users by cost (7d).
dispatch.earliest_time = -7d
dispatch.latest_time = now
disabled = 1
is_scheduled = 0
search = sourcetype="anthropic:analytics:user_cost" \
| sort - total_cost_usd \
| head 20 \
| table user_id, email, total_cost_usd, product
